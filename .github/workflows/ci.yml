name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  schedule:
    # Nightly build at 02:00 UTC to catch dependency regressions
    - cron: "0 2 * * *"

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate: runs on ubuntu-latest (fast, cheap, catches most issues)
  # ---------------------------------------------------------------------------
  quality:
    name: Quality Gate (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run Ruff format check
        run: |
          .venv/bin/ruff format --check src/rv tests || ruff format --check src/rv tests

      - name: Run Ruff lint
        run: |
          ruff check src/rv tests

      - name: Run mypy strict type check
        run: |
          mypy src/rv

      - name: Run bandit security scan (High + Medium only)
        run: |
          bandit -r src/rv -ll

      - name: Run test suite with coverage
        run: |
          pytest --cov=src/rv --cov-fail-under=90 --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Integration matrix: Docker-based runs across Ubuntu, Alpine, Arch Linux
  # ---------------------------------------------------------------------------
  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            dockerfile: tests/integration/Dockerfile.ubuntu
            image_tag: rv-test-ubuntu
          - name: alpine
            dockerfile: tests/integration/Dockerfile.alpine
            image_tag: rv-test-alpine
          - name: arch
            dockerfile: tests/integration/Dockerfile.arch
            image_tag: rv-test-arch

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image — ${{ matrix.name }}
        run: |
          docker build \
            --file ${{ matrix.dockerfile }} \
            --tag ${{ matrix.image_tag }}:latest \
            --cache-from type=gha,scope=${{ matrix.name }} \
            --cache-to type=gha,scope=${{ matrix.name }},mode=max \
            .

      - name: Run test suite inside Docker — ${{ matrix.name }}
        run: |
          docker run --rm ${{ matrix.image_tag }}:latest \
            pytest --cov=src/rv -q --tb=short

  # ---------------------------------------------------------------------------
  # Build binary: ensure PyInstaller produces a working binary
  # ---------------------------------------------------------------------------
  build-binary:
    name: Build Binary (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Build PyInstaller binary
        run: |
          pyinstaller rv.spec --clean

      - name: Smoke test binary
        run: |
          dist/rv --help
          dist/rv --version || true
