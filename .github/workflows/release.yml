name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Full quality gate before any release artifact is produced
  # ---------------------------------------------------------------------------
  pre-release-quality:
    name: Pre-Release Quality Gate
    runs-on: ubuntu-latest

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # SHA-pinned: actions/setup-python v5.3.0
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src/rv tests

      - name: Ruff lint
        run: ruff check src/rv tests

      - name: mypy strict
        run: mypy src/rv

      - name: bandit security scan
        run: bandit -r src/rv -ll

      - name: Full test suite (≥90% coverage required)
        run: pytest --cov=src/rv --cov-fail-under=90 -q

  # ---------------------------------------------------------------------------
  # Build PyInstaller binary for Linux (ubuntu-latest)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Binary (Linux)
    runs-on: ubuntu-latest
    needs: pre-release-quality

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # SHA-pinned: actions/setup-python v5.3.0
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build PyInstaller binary
        run: pyinstaller rv.spec --clean

      - name: Smoke test binary
        run: |
          dist/rv --help
          dist/rv --version || true

      - name: Compute SHA-256 checksum
        run: sha256sum dist/rv > dist/rv-linux-x86_64.sha256

      - name: Rename binary with platform suffix
        run: mv dist/rv dist/rv-linux-x86_64

      # SHA-pinned: actions/upload-artifact v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: rv-linux-x86_64
          path: |
            dist/rv-linux-x86_64
            dist/rv-linux-x86_64.sha256

  # ---------------------------------------------------------------------------
  # Build PyInstaller binary for macOS (macos-latest)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build Binary (macOS)
    runs-on: macos-latest
    needs: pre-release-quality

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # SHA-pinned: actions/setup-python v5.3.0
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build PyInstaller binary
        run: pyinstaller rv.spec --clean

      - name: Smoke test binary
        run: |
          dist/rv --help
          dist/rv --version || true

      - name: Compute SHA-256 checksum
        run: shasum -a 256 dist/rv > dist/rv-macos-universal.sha256

      - name: Rename binary with platform suffix
        run: mv dist/rv dist/rv-macos-universal

      # SHA-pinned: actions/upload-artifact v4.4.3
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: rv-macos-universal
          path: |
            dist/rv-macos-universal
            dist/rv-macos-universal.sha256

  # ---------------------------------------------------------------------------
  # Publish to PyPI
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    environment: pypi

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # SHA-pinned: actions/setup-python v5.3.0
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build distribution packages
        run: python -m build

      # SHA-pinned: pypa/gh-action-pypi-publish v1.12.3
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@15c56dba361d8335944d31a2ecd17d700fc7eb8e

  # ---------------------------------------------------------------------------
  # Create GitHub Release with binaries + checksums
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, publish-pypi]

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # SHA-pinned: actions/download-artifact v4.1.8
      - name: Download Linux binary
        uses: actions/download-artifact@fa0a91b85d4f404e444306234b21f4ee0e32f648
        with:
          name: rv-linux-x86_64
          path: release-artifacts/

      - name: Download macOS binary
        uses: actions/download-artifact@fa0a91b85d4f404e444306234b21f4ee0e32f648
        with:
          name: rv-macos-universal
          path: release-artifacts/

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # SHA-pinned: softprops/action-gh-release v2.1.0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Revive ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
