# Revive Configuration Manifest
version: 2

assets:
  - id: example_zshrc
    type: symlink
    source: assets/example_zshrc
    target: ${USER_HOME}/.zshrc
    permissions: "0644"
    conflict_strategy: prompt

  - id: card_express_assets
    type: symlink
    source: assets/card_express
    target: 
      - ${CARD_EXPRESS_DIR}/compose
      - ${CARD_EXPRESS_DIR}/docker-compose.yml
    permissions: "0644"
    conflict_strategy: prompt

secrets:
  - id: card_express_env
    source: secrets/card_express_env
    target: 
      - ${CARD_EXPRESS_DIR}/.env
      - ${CARD_EXPRESS_DIR}/.env.deploy
    permissions: "0600"

packages:
  brew: []
  apt:
    - git
    - git-crypt
    - gh
    - curl
    - wget
    - zsh
    - zoxide
    - fzf
    - xxd
    - code
    - docker-ce
    - docker-ce-cli
    - docker-buildx-plugin
    - docker-compose-plugin
    - containerd.io
    - python3
    - python3-pip
    - pipx
    - build-essential
    - jq
    - htop
    - unzip
    - zip
    - tmux
    - ripgrep
    - shellcheck
  flatpak: []
  snap: []
  docker:
    images: []
  node:
    version_file: .nvmrc

profiles:
  base:
    assets:
      - example_zshrc
      - card_express_assets
    secrets:
      - card_express_env
    packages:
      - apt
